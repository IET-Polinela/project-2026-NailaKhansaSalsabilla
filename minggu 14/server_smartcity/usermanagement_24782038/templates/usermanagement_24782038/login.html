{% extends 'base.html' %}

{% block title %}Login - IET City{% endblock %}

{% block content %}
<div class="auth-panel">
    <div class="card">
        <div class="card-body p-4 p-lg-5">
            <div class="text-center mb-4">
                <span class="icon-chip bg-primary-subtle text-primary mb-3">
                    <i class="bi bi-shield-lock"></i>
                </span>
                <h1 class="h3 fw-bold mb-1">Login</h1>
                <p class="text-muted mb-0">Masuk ke dashboard IET City.</p>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i>
                    Login
                </button>
            </form>

            <p class="mt-4 text-center mb-0">
                Belum punya akun?
                <a href="{% url 'register' %}" class="fw-semibold text-decoration-none">Daftar di sini</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
