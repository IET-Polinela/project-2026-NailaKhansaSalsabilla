<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Issue Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: #f3f5f8;
            color: #20242a;
        }

        .navbar {
            background: linear-gradient(90deg, #0f3f78, #087f8c);
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: 0.4px;
        }

        .main-area {
            padding: 28px 26px;
        }

        .side-card {
            border: 0;
            border-radius: 10px;
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        .create-button {
            min-height: 170px;
            border-radius: 8px;
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.45;
        }

        .status-title {
            font-size: 1.05rem;
            font-weight: 800;
            color: #4b5563;
            letter-spacing: 0.4px;
        }

        .status-row {
            padding: 12px 0;
            border-bottom: 1px solid #e4e7ec;
            font-size: 1.05rem;
        }

        .status-row:last-child {
            border-bottom: 0;
        }

        .content-tabs {
            border-bottom: 1px solid #d8dde5;
            margin-bottom: 26px;
        }

        .content-tabs .nav-link {
            border: 1px solid transparent;
            border-radius: 7px 7px 0 0;
            padding: 15px 24px;
            font-size: 1.15rem;
            font-weight: 800;
            color: #444b54;
            background: transparent;
        }

        .content-tabs .nav-link.active {
            color: #0d6efd;
            background: #ffffff;
            border-color: #d8dde5 #d8dde5 #ffffff;
        }

        .report-card {
            border: 0;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
            min-height: 320px;
        }

        .report-card .card-body {
            padding: 25px 26px;
        }

        .report-title {
            font-size: 1.45rem;
            font-weight: 900;
            letter-spacing: 0.4px;
        }

        .report-description {
            font-size: 1.05rem;
            color: #4b5563;
            min-height: 62px;
            line-height: 1.6;
        }

        .report-meta {
            border-top: 1px solid #d4d9e1;
            margin-top: 16px;
            padding-top: 14px;
            font-size: 1rem;
        }

        .progress {
            height: 8px;
            border-radius: 999px;
            background: #e8ebef;
        }

        .progress-label {
            font-size: 0.9rem;
            font-weight: 800;
        }

        .empty-box {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
            padding: 70px 20px;
            text-align: center;
            font-size: 1.2rem;
            color: #4b5563;
        }

        .soft-input {
            border-radius: 10px;
            padding: 11px 14px;
        }

        .text-small {
            font-size: 0.95rem;
        }

        .badge {
            letter-spacing: 0.4px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="#dashboard">
                <i class="bi bi-broadcast-pin me-2"></i>Citizen Issue Hub
            </a>

            <div class="ms-auto d-flex align-items-center gap-3">
                <span id="userGreeting" class="text-white fw-semibold d-none">
                    <i class="bi bi-person-circle me-1"></i>Haii, Warga
                </span>

                <button id="logoutButton" class="btn btn-light btn-sm d-none" onclick="logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <main id="app-content" class="main-area"></main>

    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="reportModalTitle">Tambah Laporan Baru</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Tutup"></button>
                </div>

                <div class="modal-body">
                    <form id="reportForm">
                        <div class="mb-3">
                            <label for="reportTitle" class="form-label fw-semibold">Judul Laporan</label>
                            <input type="text" id="reportTitle" class="form-control soft-input" required>
                        </div>

                        <div class="mb-3">
                            <label for="reportCategory" class="form-label fw-semibold">Kategori</label>
                            <input type="text" id="reportCategory" class="form-control soft-input" required>
                        </div>

                        <div class="mb-3">
                            <label for="reportLocation" class="form-label fw-semibold">Lokasi</label>
                            <input type="text" id="reportLocation" class="form-control soft-input" required>
                        </div>

                        <div class="mb-3">
                            <label for="reportDescription" class="form-label fw-semibold">Deskripsi</label>
                            <textarea id="reportDescription" class="form-control soft-input" rows="4" required></textarea>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                        Batal
                    </button>

                    <button type="button" id="saveDraftButton" class="btn btn-warning">
                        <i class="bi bi-save me-1"></i>Simpan Draft
                    </button>

                    <button type="button" id="submitReportButton" class="btn btn-primary">
                        <i class="bi bi-send me-1"></i>Ajukan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js?v=99999"></script>
    <script src="js/auth.js?v=99999"></script>
    <script src="js/router.js?v=99999"></script>
    <script src="js/app.js?v=99999"></script>
</body>
</html>
