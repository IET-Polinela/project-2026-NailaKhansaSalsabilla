<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Issue Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(13, 110, 253, 0.12), transparent 32%),
                linear-gradient(135deg, #f6f9ff 0%, #eef6f4 100%);
        }

        .navbar {
            background: linear-gradient(90deg, #0f3f78, #087f8c);
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: 0.4px;
        }

        .glass-card {
            border: 1px solid rgba(15, 63, 120, 0.08);
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }

        .side-card {
            border: 0;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.07);
        }

        .report-item {
            border: 0;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.07);
        }

        .report-accent {
            width: 7px;
            background: linear-gradient(180deg, #0d6efd, #20c997);
        }

        .mini-icon {
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: #eaf4ff;
            color: #0d6efd;
        }

        .text-small {
            font-size: 0.9rem;
        }

        .soft-input {
            border-radius: 14px;
            padding: 11px 14px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="#dashboard">
                <i class="bi bi-broadcast-pin me-2"></i>Citizen Issue Hub
            </a>

            <div class="ms-auto d-flex gap-2">
                <a class="btn btn-outline-light btn-sm" href="#dashboard">
                    <i class="bi bi-grid-1x2-fill me-1"></i>Dashboard
                </a>
                <button id="logoutButton" class="btn btn-light btn-sm d-none" onclick="logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <main id="app-content" class="container-fluid p-4"></main>

    <script src="js/api.js?v=2000"></script>
    <script src="js/auth.js?v=2000"></script>
    <script src="js/router.js?v=2000"></script>
    <script src="js/app.js?v=2000"></script>
</body>
</html>
